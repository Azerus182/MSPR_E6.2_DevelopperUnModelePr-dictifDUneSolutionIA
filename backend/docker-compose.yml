services:
  account:
    container_name: account
    build:
      context: account
      dockerfile: Dockerfile.api
    ports:
      - "4000:4000"
    depends_on:
      - account-data
    environment:
      - DB_USER=user
      - DB_PASSWORD=userpassword
      - DB_HOST=account-data
      - DB_PORT=3306
      - DB_NAME=account
    volumes:
      - ./account:/app
    networks:
      - health-ai

  account-data:
    container_name: account-data
    image: mysql:8.0
    ports:
      - "3306:3306"
    volumes:
      - account-data:/var/lib/mysql
      - ./account/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: account
      MYSQL_USER: user
      MYSQL_PASSWORD: userpassword
    restart: unless-stopped
    networks:
      - health-ai

  food-detector:
    build:
      context: food-detector
      dockerfile: Dockerfile
    container_name: food-detector
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    environment:
      - MONGO_URI=mongodb://admin:secret@mongo:27017/mydb?authSource=admin
    volumes:
      - ./food-detector:/app
    networks:
      - health-ai

  mongo:
    image: mongo
    container_name: mongo_db
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secret
      MONGO_INITDB_DATABASE: mydb
    networks:
      - health-ai

networks:
  health-ai:
    driver: bridge

volumes:
  account-data:
  mongo_data: